<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>家常菜谱菜单生成器</title>
  <style>
    :root {
      --bg: #fff7ed;
      --card: rgba(255, 255, 255, 0.9);
      --text: #2f241d;
      --muted: #7a6656;
      --primary: #ef7d32;
      --primary-strong: #d65f16;
      --accent: #18a058;
      --danger: #c94c4c;
      --line: rgba(128, 78, 39, 0.16);
      --shadow: 0 18px 50px rgba(120, 71, 31, 0.14);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 180, 102, 0.35), transparent 30%),
        radial-gradient(circle at top right, rgba(255, 122, 89, 0.22), transparent 28%),
        linear-gradient(135deg, #fff7ed 0%, #fffaf3 52%, #f6fff6 100%);
      min-height: 100vh;
    }

    .app {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    header {
      background: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(255,246,232,0.86));
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    header::after {
      content: "";
      position: absolute;
      right: -42px;
      top: -48px;
      width: 180px;
      height: 180px;
      border-radius: 999px;
      background: rgba(239, 125, 50, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 44px);
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
      max-width: 790px;
      position: relative;
      z-index: 1;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
      position: relative;
      z-index: 1;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--line);
      font-size: 14px;
      color: var(--muted);
    }

    .status-card {
      margin-top: 16px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,0.75);
      color: var(--muted);
      line-height: 1.7;
      position: relative;
      z-index: 1;
    }

    .status-card.error {
      color: #8b3b20;
      border-color: rgba(201, 76, 76, 0.28);
      background: rgba(255, 240, 232, 0.85);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 370px;
      gap: 20px;
      margin-top: 20px;
      align-items: start;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .panel-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-title { margin: 0; font-size: 18px; }
    .panel-body { padding: 18px; }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto;
      gap: 12px;
      margin-bottom: 14px;
    }

    input[type="search"], input[type="number"], select {
      width: 100%;
      padding: 11px 13px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      outline: none;
      font-size: 15px;
    }

    input:focus, select:focus {
      border-color: rgba(239, 125, 50, 0.65);
      box-shadow: 0 0 0 3px rgba(239, 125, 50, 0.12);
    }

    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }

    button, .file-button {
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      padding: 10px 13px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .16s ease, background .16s ease, box-shadow .16s ease;
      box-shadow: 0 8px 18px rgba(239, 125, 50, 0.18);
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 14px;
    }

    button:hover, .file-button:hover { transform: translateY(-1px); background: var(--primary-strong); }
    button:active, .file-button:active { transform: translateY(0); }
    button.secondary { background: #fff; color: var(--text); border: 1px solid var(--line); box-shadow: none; }
    button.secondary:hover { background: #fff6ea; }
    button.success { background: var(--accent); box-shadow: 0 8px 18px rgba(24, 160, 88, .18); }
    button.danger { background: var(--danger); box-shadow: 0 8px 18px rgba(201, 76, 76, .16); }
    button.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); box-shadow: none; }

    .tab {
      background: rgba(255,255,255,.8);
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .tab.active {
      background: var(--primary);
      color: white;
      border-color: transparent;
      box-shadow: 0 8px 18px rgba(239, 125, 50, .18);
    }

    .recipes-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 13px;
    }

    .recipe-card {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .82);
      border-radius: 16px;
      padding: 15px;
      display: grid;
      gap: 12px;
      min-height: 174px;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
      position: relative;
    }

    .recipe-card:hover { transform: translateY(-2px); border-color: rgba(239, 125, 50, .35); }
    .recipe-card.selected { background: #fff7ec; border-color: rgba(239, 125, 50, .54); }

    .recipe-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .recipe-name { margin: 0; font-size: 17px; }
    .recipe-category { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .ingredients { color: var(--muted); line-height: 1.55; font-size: 14px; }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 24px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(24, 160, 88, .09);
      color: #23764b;
      font-size: 12px;
    }

    .recipe-card input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .side { position: sticky; top: 16px; }

    .random-box {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .random-row {
      display: grid;
      grid-template-columns: 1fr 96px;
      gap: 10px;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .selected-list, .ingredient-list {
      display: grid;
      gap: 8px;
      margin: 12px 0 0;
      padding: 0;
      list-style: none;
      max-height: 270px;
      overflow: auto;
      padding-right: 3px;
    }

    .selected-item {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 10px 10px;
      border-radius: 12px;
      background: rgba(255, 255, 255, .76);
      border: 1px solid var(--line);
    }

    .selected-item small { color: var(--muted); display: block; margin-top: 2px; }
    .selected-item button { padding: 7px 9px; border-radius: 10px; }

    .ingredient-item {
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.68);
      color: var(--muted);
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .empty {
      color: var(--muted);
      padding: 18px;
      text-align: center;
      border: 1px dashed rgba(128,78,39,.25);
      border-radius: 14px;
      background: rgba(255,255,255,.52);
      line-height: 1.7;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
      margin-top: 10px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 16px 0 8px;
      color: var(--text);
      font-weight: 800;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .load-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    #jsonFileInput { display: none; }

    .hidden { display: none !important; }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .side { position: static; }
      .recipes-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .app { width: min(100% - 18px, 1180px); padding-top: 12px; }
      header { padding: 22px 18px; border-radius: 22px; }
      .toolbar, .random-row, .button-grid { grid-template-columns: 1fr; }
      .panel-head { align-items: flex-start; flex-direction: column; }
      .actions button, .load-tools button, .file-button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1 id="pageTitle">家常菜谱菜单生成器</h1>
      <p class="subtitle">菜谱数据来自同目录下的 <strong>recipes.json</strong>。后续添加新菜品时，只需要修改 JSON 文件，不需要改 HTML 代码。</p>
      <div class="stats" id="stats"></div>
      <div id="dataStatus" class="status-card">正在读取 recipes.json……</div>
      <div class="load-tools">
        <label for="jsonFileInput" class="file-button">手动导入 JSON</label>
        <input id="jsonFileInput" type="file" accept="application/json,.json" />
        <button class="secondary" id="reloadBtn">重新读取 recipes.json</button>
      </div>
    </header>

    <section class="layout">
      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title">菜品列表</h2>
          <div class="actions" style="margin-top:0">
            <button class="secondary" id="selectVisibleBtn">选择当前显示</button>
            <button class="secondary" id="clearVisibleBtn">取消当前显示</button>
          </div>
        </div>
        <div class="panel-body">
          <div class="toolbar">
            <input id="searchInput" type="search" placeholder="搜索菜名、材料或标签，例如：鸡翅、豆腐、香辣" />
            <button class="ghost" id="showSelectedBtn">仅看已选：关</button>
          </div>
          <div class="category-tabs" id="categoryTabs"></div>
          <div id="recipesGrid" class="recipes-grid"></div>
        </div>
      </section>

      <aside class="panel side">
        <div class="panel-head">
          <h2 class="panel-title">今日菜单</h2>
          <span class="pill" id="selectedCount">0 道</span>
        </div>
        <div class="panel-body">
          <div class="random-box">
            <div class="random-row">
              <select id="randomCategorySelect"></select>
              <input id="randomCount" type="number" min="1" value="3" />
            </div>
            <div class="button-grid">
              <button id="randomAllBtn">全部随机</button>
              <button id="randomByCategoryBtn">按类别随机</button>
            </div>
            <div class="button-grid">
              <button class="secondary" id="copyMenuBtn">复制菜单</button>
              <button class="secondary" id="exportTxtBtn">导出 TXT</button>
            </div>
          </div>

          <div class="section-title">
            <span>已选菜品</span>
            <button class="danger" id="clearSelectedBtn">清空</button>
          </div>
          <ul class="selected-list" id="selectedList"></ul>

          <div class="section-title"><span>材料汇总</span></div>
          <ul class="ingredient-list" id="ingredientList"></ul>
          <p class="hint">提示：本页面可以多选菜品生成菜单；随机按钮会替换当前菜单。材料汇总会自动合并重复材料。</p>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const DATA_FILE = 'recipes.json';
    const state = {
      data: { meta: {}, categories: [], recipes: [] },
      activeCategory: 'all',
      search: '',
      selected: new Set(),
      showSelectedOnly: false
    };

    const els = {
      pageTitle: document.getElementById('pageTitle'),
      stats: document.getElementById('stats'),
      dataStatus: document.getElementById('dataStatus'),
      jsonFileInput: document.getElementById('jsonFileInput'),
      reloadBtn: document.getElementById('reloadBtn'),
      categoryTabs: document.getElementById('categoryTabs'),
      recipesGrid: document.getElementById('recipesGrid'),
      searchInput: document.getElementById('searchInput'),
      showSelectedBtn: document.getElementById('showSelectedBtn'),
      selectVisibleBtn: document.getElementById('selectVisibleBtn'),
      clearVisibleBtn: document.getElementById('clearVisibleBtn'),
      randomCategorySelect: document.getElementById('randomCategorySelect'),
      randomCount: document.getElementById('randomCount'),
      randomAllBtn: document.getElementById('randomAllBtn'),
      randomByCategoryBtn: document.getElementById('randomByCategoryBtn'),
      selectedCount: document.getElementById('selectedCount'),
      selectedList: document.getElementById('selectedList'),
      ingredientList: document.getElementById('ingredientList'),
      clearSelectedBtn: document.getElementById('clearSelectedBtn'),
      copyMenuBtn: document.getElementById('copyMenuBtn'),
      exportTxtBtn: document.getElementById('exportTxtBtn')
    };

    function escapeHtml(text) {
      return String(text ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function setStatus(message, isError = false) {
      els.dataStatus.innerHTML = message;
      els.dataStatus.classList.toggle('error', isError);
    }

    async function loadDataFromFetch() {
      setStatus('正在读取 recipes.json……');
      try {
        const url = `${DATA_FILE}?t=${Date.now()}`;
        const response = await fetch(url, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        applyData(data, `已读取同目录下的 <strong>${DATA_FILE}</strong>。`);
      } catch (error) {
        setStatus(
          `未能自动读取 <strong>${DATA_FILE}</strong>。如果你是直接双击打开 HTML，部分浏览器会限制读取本地 JSON 文件。<br>` +
          `可以点击“手动导入 JSON”选择 recipes.json；或者在该文件夹运行本地服务器后访问页面。`,
          true
        );
        console.warn(error);
      }
    }

    function validateData(data) {
      if (!data || typeof data !== 'object') throw new Error('JSON 顶层必须是对象。');
      if (!Array.isArray(data.categories)) throw new Error('JSON 中必须包含 categories 数组。');
      if (!Array.isArray(data.recipes)) throw new Error('JSON 中必须包含 recipes 数组。');
      const categoryIds = new Set(data.categories.map(c => c.id));
      data.recipes.forEach((recipe, index) => {
        if (!recipe.id || !recipe.name || !recipe.categoryId) {
          throw new Error(`recipes 第 ${index + 1} 项缺少 id、name 或 categoryId。`);
        }
        if (!categoryIds.has(recipe.categoryId)) {
          throw new Error(`菜品“${recipe.name}”的 categoryId=${recipe.categoryId} 没有对应分类。`);
        }
        if (!Array.isArray(recipe.ingredients)) recipe.ingredients = [];
        if (!Array.isArray(recipe.tags)) recipe.tags = [];
      });
    }

    function applyData(data, message) {
      validateData(data);
      state.data = data;
      state.selected.clear();
      state.activeCategory = 'all';
      state.search = '';
      state.showSelectedOnly = false;
      els.searchInput.value = '';
      els.showSelectedBtn.textContent = '仅看已选：关';
      els.pageTitle.textContent = data.meta?.title ? `${data.meta.title}菜单生成器` : '家常菜谱菜单生成器';
      setStatus(message || 'JSON 数据已加载。');
      renderAll();
    }

    function getCategoryById(id) {
      return state.data.categories.find(c => c.id === id) || { name: '未分类', emoji: '🍽️' };
    }

    function categoryCount(categoryId) {
      if (categoryId === 'all') return state.data.recipes.length;
      return state.data.recipes.filter(r => r.categoryId === categoryId).length;
    }

    function filteredRecipes() {
      const q = state.search.trim().toLowerCase();
      return state.data.recipes.filter(recipe => {
        const matchCategory = state.activeCategory === 'all' || recipe.categoryId === state.activeCategory;
        const text = [recipe.name, ...recipe.ingredients, ...(recipe.tags || [])].join(' ').toLowerCase();
        const matchSearch = !q || text.includes(q);
        const matchSelected = !state.showSelectedOnly || state.selected.has(recipe.id);
        return matchCategory && matchSearch && matchSelected;
      });
    }

    function renderStats() {
      const count = state.data.recipes.length;
      const catCount = state.data.categories.length;
      const selected = state.selected.size;
      const version = state.data.meta?.version ? `v${state.data.meta.version}` : 'JSON 数据';
      els.stats.innerHTML = `
        <span class="pill">🍽️ ${count} 道菜</span>
        <span class="pill">📂 ${catCount} 个分类</span>
        <span class="pill">✅ 已选 ${selected} 道</span>
        <span class="pill">🧾 ${escapeHtml(version)}</span>
      `;
    }

    function renderCategoryTabs() {
      const allTab = `<button class="tab ${state.activeCategory === 'all' ? 'active' : ''}" data-category="all">全部 ${categoryCount('all')}</button>`;
      const tabs = state.data.categories.map(cat => {
        const active = state.activeCategory === cat.id ? 'active' : '';
        return `<button class="tab ${active}" data-category="${escapeHtml(cat.id)}">${escapeHtml(cat.emoji || '🍽️')} ${escapeHtml(cat.name)} ${categoryCount(cat.id)}</button>`;
      }).join('');
      els.categoryTabs.innerHTML = allTab + tabs;

      els.categoryTabs.querySelectorAll('button[data-category]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.activeCategory = btn.dataset.category;
          renderAll();
        });
      });
    }

    function renderRecipes() {
      const recipes = filteredRecipes();
      if (recipes.length === 0) {
        els.recipesGrid.innerHTML = '<div class="empty">没有匹配的菜品。可以切换分类、清空搜索，或在 recipes.json 中添加新菜品。</div>';
        return;
      }

      els.recipesGrid.innerHTML = recipes.map(recipe => {
        const category = getCategoryById(recipe.categoryId);
        const checked = state.selected.has(recipe.id);
        const tags = (recipe.tags || []).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('');
        return `
          <article class="recipe-card ${checked ? 'selected' : ''}" data-id="${escapeHtml(recipe.id)}">
            <div class="recipe-top">
              <div>
                <h3 class="recipe-name">${escapeHtml(recipe.name)}</h3>
                <div class="recipe-category">${escapeHtml(category.emoji || '🍽️')} ${escapeHtml(category.name)}</div>
              </div>
              <input type="checkbox" ${checked ? 'checked' : ''} aria-label="选择 ${escapeHtml(recipe.name)}" />
            </div>
            <div class="ingredients"><strong>材料：</strong>${escapeHtml(recipe.ingredients.join('、'))}</div>
            <div class="tags">${tags}</div>
          </article>
        `;
      }).join('');

      els.recipesGrid.querySelectorAll('.recipe-card').forEach(card => {
        const id = card.dataset.id;
        const checkbox = card.querySelector('input[type="checkbox"]');
        card.addEventListener('click', event => {
          if (event.target.tagName.toLowerCase() === 'input') return;
          toggleSelected(id);
        });
        checkbox.addEventListener('change', () => toggleSelected(id, checkbox.checked));
      });
    }

    function toggleSelected(id, force) {
      const shouldSelect = typeof force === 'boolean' ? force : !state.selected.has(id);
      if (shouldSelect) state.selected.add(id);
      else state.selected.delete(id);
      renderAll();
    }

    function renderRandomOptions() {
      const options = [
        `<option value="all">全部分类</option>`,
        ...state.data.categories.map(cat => `<option value="${escapeHtml(cat.id)}">${escapeHtml(cat.emoji || '')} ${escapeHtml(cat.name)}</option>`)
      ].join('');
      const current = els.randomCategorySelect.value || 'all';
      els.randomCategorySelect.innerHTML = options;
      els.randomCategorySelect.value = state.data.categories.some(c => c.id === current) || current === 'all' ? current : 'all';
    }

    function selectedRecipes() {
      return state.data.recipes.filter(recipe => state.selected.has(recipe.id));
    }

    function renderSelectedList() {
      const recipes = selectedRecipes();
      els.selectedCount.textContent = `${recipes.length} 道`;
      if (recipes.length === 0) {
        els.selectedList.innerHTML = '<li class="empty">还没有选择菜品。可以从左侧勾选，或使用随机生成。</li>';
        els.ingredientList.innerHTML = '<li class="empty">选择菜品后会自动汇总材料。</li>';
        return;
      }

      els.selectedList.innerHTML = recipes.map(recipe => {
        const category = getCategoryById(recipe.categoryId);
        return `
          <li class="selected-item">
            <div>
              <strong>${escapeHtml(recipe.name)}</strong>
              <small>${escapeHtml(category.emoji || '🍽️')} ${escapeHtml(category.name)}</small>
            </div>
            <button class="danger" data-remove="${escapeHtml(recipe.id)}">移除</button>
          </li>
        `;
      }).join('');

      els.selectedList.querySelectorAll('button[data-remove]').forEach(btn => {
        btn.addEventListener('click', () => toggleSelected(btn.dataset.remove, false));
      });

      renderIngredientSummary(recipes);
    }

    function renderIngredientSummary(recipes) {
      const countMap = new Map();
      recipes.forEach(recipe => {
        recipe.ingredients.forEach(item => {
          const key = String(item).trim();
          if (!key) return;
          countMap.set(key, (countMap.get(key) || 0) + 1);
        });
      });
      const items = [...countMap.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'zh'));
      els.ingredientList.innerHTML = items.map(([name, count]) => `
        <li class="ingredient-item"><span>${escapeHtml(name)}</span><strong>×${count}</strong></li>
      `).join('');
    }

    function renderAll() {
      renderStats();
      renderCategoryTabs();
      renderRandomOptions();
      renderRecipes();
      renderSelectedList();
    }

    function pickRandom(list, count) {
      const copy = [...list];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy.slice(0, Math.max(0, Math.min(count, copy.length)));
    }

    function randomSelect(categoryId) {
      const count = Number.parseInt(els.randomCount.value, 10) || 1;
      const pool = state.data.recipes.filter(recipe => categoryId === 'all' || recipe.categoryId === categoryId);
      const picked = pickRandom(pool, count);
      state.selected = new Set(picked.map(recipe => recipe.id));
      renderAll();
    }

    function menuText() {
      const recipes = selectedRecipes();
      if (recipes.length === 0) return '今日菜单：暂无选择';
      const lines = ['今日菜单', ''];
      recipes.forEach((recipe, index) => {
        const category = getCategoryById(recipe.categoryId);
        lines.push(`${index + 1}. ${recipe.name}（${category.name}）`);
        lines.push(`   材料：${recipe.ingredients.join('、')}`);
      });
      const ingredientMap = new Map();
      recipes.forEach(recipe => recipe.ingredients.forEach(item => ingredientMap.set(item, (ingredientMap.get(item) || 0) + 1)));
      lines.push('', '材料汇总：');
      [...ingredientMap.entries()].sort((a,b) => b[1]-a[1] || a[0].localeCompare(b[0], 'zh')).forEach(([name, count]) => {
        lines.push(`- ${name} ×${count}`);
      });
      return lines.join('\n');
    }

    async function copyMenu() {
      const text = menuText();
      try {
        await navigator.clipboard.writeText(text);
        alert('菜单已复制到剪贴板。');
      } catch {
        const temp = document.createElement('textarea');
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        temp.remove();
        alert('菜单已复制到剪贴板。');
      }
    }

    function exportTxt() {
      const blob = new Blob([menuText()], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '今日菜单.txt';
      a.click();
      URL.revokeObjectURL(url);
    }

    function bindEvents() {
      els.searchInput.addEventListener('input', () => {
        state.search = els.searchInput.value;
        renderRecipes();
      });

      els.showSelectedBtn.addEventListener('click', () => {
        state.showSelectedOnly = !state.showSelectedOnly;
        els.showSelectedBtn.textContent = `仅看已选：${state.showSelectedOnly ? '开' : '关'}`;
        renderRecipes();
      });

      els.selectVisibleBtn.addEventListener('click', () => {
        filteredRecipes().forEach(recipe => state.selected.add(recipe.id));
        renderAll();
      });

      els.clearVisibleBtn.addEventListener('click', () => {
        filteredRecipes().forEach(recipe => state.selected.delete(recipe.id));
        renderAll();
      });

      els.clearSelectedBtn.addEventListener('click', () => {
        state.selected.clear();
        renderAll();
      });

      els.randomAllBtn.addEventListener('click', () => randomSelect('all'));
      els.randomByCategoryBtn.addEventListener('click', () => randomSelect(els.randomCategorySelect.value));
      els.copyMenuBtn.addEventListener('click', copyMenu);
      els.exportTxtBtn.addEventListener('click', exportTxt);
      els.reloadBtn.addEventListener('click', loadDataFromFetch);

      els.jsonFileInput.addEventListener('change', event => {
        const file = event.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const data = JSON.parse(reader.result);
            applyData(data, `已手动导入 <strong>${escapeHtml(file.name)}</strong>。`);
          } catch (error) {
            setStatus(`JSON 导入失败：${escapeHtml(error.message)}`, true);
          }
        };
        reader.readAsText(file, 'utf-8');
      });
    }

    bindEvents();
    loadDataFromFetch();
  </script>
</body>
</html>
